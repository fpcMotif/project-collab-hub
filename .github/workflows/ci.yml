name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-lint-${{ hashFiles('bun.lock') }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-lint-${{ hashFiles('bun.lock') }}-
      - run: bun install --frozen-lockfile
      - run: bun run lint

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-typecheck-${{ hashFiles('bun.lock') }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-typecheck-${{ hashFiles('bun.lock') }}-
      - run: bun install --frozen-lockfile
      - run: bunx convex codegen
        working-directory: packages/backend
      - run: bun run check-types

  build:
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-build-${{ hashFiles('bun.lock') }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-build-${{ hashFiles('bun.lock') }}-
      - run: bun install --frozen-lockfile
      - run: bunx convex codegen
        working-directory: packages/backend
      - run: bun run build
